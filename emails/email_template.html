<!DOCTYPE html>
<html>
<body style="margin:0;padding:0;background-color:#f0f0f0;">

<table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f0f0f0">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" bgcolor="#ffffff">
        
        <tr>
          <td align="center" style="padding:32px 20px; background-color:#ffffff;">
            <img src="https://raw.githubusercontent.com/MIAMIX-io/miamix-email/main/MIAMIX-LandscapeHeader-BrandPinkV3-Transparent.png"
                 width="200"
                 alt="MIAMIX"
                 style="display:block;border:0;">
          </td>
        </tr>

        <tr>
          <td style="padding:32px 30px;font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.6;color:#333333;">
            <p>Hello {{ name }},</p>
            
            {{ email_content_from_file | safe }}

            <p style="margin-top:30px;">
              Best regards,<br>
              <strong>The MIAMIX Team</strong>
            </p>
          </td>
        </tr>

        <tr>
          <td style="padding:20px 30px;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#666666;text-align:center;background-color:#fafafa;">
            <p style="margin:0 0 6px 0;">
              MIAMIX LLC · Miami, FL
            </p>
            <p style="margin:0;">
              <a href="https://www.miamix.io/unsubscribe" style="color:#666666;text-decoration:underline;">
                Unsubscribe
              </a>
            </p>
          </td>
        </tr>

        <tr><td height="20"></td></tr>
      </table>
    </td>
  </tr>
</table>

</body>
</html>
